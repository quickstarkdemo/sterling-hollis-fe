services:
  storefront:
    image: ${APP_IMAGE}
    container_name: ${APP_CONTAINER_NAME:-sterling-hollis-fe}
    restart: unless-stopped
    env_file:
      - ./runtime.env
    ports:
      - "${FRONTEND_PORT:-45173}:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider http://127.0.0.1/frontend-health",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s
