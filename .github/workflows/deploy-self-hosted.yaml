name: Sterling Hollis Frontend

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: self-hosted
    env:
      DOCKERHUB_IMAGE: ${{ secrets.DOCKERHUB_IMAGE }}
      FRONTEND_PORT: ${{ secrets.FRONTEND_PORT || '3000' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Read version
        id: version
        run: |
          BASE_VERSION=$(tr -d '[:space:]' < VERSION)
          SHORT_SHA="${GITHUB_SHA::7}"
          VERSION="${BASE_VERSION}-${SHORT_SHA}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VERSION"

      - name: Verify docker access
        run: |
          docker version
          docker compose version

      - name: Detect image-affecting changes
        id: image_changes
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BEFORE_SHA="${{ github.event.before }}"
          AFTER_SHA="${GITHUB_SHA}"

          if [[ -z "$BEFORE_SHA" || "$BEFORE_SHA" =~ ^0+$ ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if ! git cat-file -e "${BEFORE_SHA}^{commit}" 2>/dev/null || ! git cat-file -e "${AFTER_SHA}^{commit}" 2>/dev/null; then
            git fetch --no-tags --prune --depth=100 origin "${GITHUB_REF#refs/heads/}" || true
          fi

          if ! CHANGED_FILES="$(git diff --name-only "$BEFORE_SHA" "$AFTER_SHA")"; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "$CHANGED_FILES"
          if echo "$CHANGED_FILES" | grep -Eq '^(src/|public/|docker/|deploy/|Dockerfile$|index\.html$|package(-lock)?\.json$|vite\.config\.js$|\.github/workflows/)'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push storefront image
        if: steps.image_changes.outputs.changed == 'true'
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login --username "${{ secrets.DOCKERHUB_USER }}" --password-stdin
          docker build \
            -t "${DOCKERHUB_IMAGE}:latest" \
            -t "${DOCKERHUB_IMAGE}:${{ steps.version.outputs.version }}" \
            .
          docker push "${DOCKERHUB_IMAGE}:latest"
          docker push "${DOCKERHUB_IMAGE}:${{ steps.version.outputs.version }}"

      - name: Resolve deploy image
        id: deploy_image
        shell: bash
        run: |
          if [[ "${{ steps.image_changes.outputs.changed }}" == "true" ]]; then
            DEPLOY_IMAGE="${DOCKERHUB_IMAGE}:${{ steps.version.outputs.version }}"
          else
            DEPLOY_IMAGE="${DOCKERHUB_IMAGE}:latest"
          fi
          echo "ref=$DEPLOY_IMAGE" >> "$GITHUB_OUTPUT"

      - name: Write runtime env file
        run: |
          cat > deploy/runtime.env <<EOF
          VITE_API_URL=${{ secrets.VITE_API_URL }}
          VITE_API_PROXY_TARGET=${{ secrets.VITE_API_PROXY_TARGET || 'https://products-api.quickstark.com' }}
          VITE_DEFAULT_STORE_ID=${{ secrets.VITE_DEFAULT_STORE_ID }}
          VITE_ENVIRONMENT=${{ secrets.VITE_ENVIRONMENT || 'production' }}
          VITE_DATADOG_APPLICATION_ID=${{ secrets.VITE_DATADOG_APPLICATION_ID }}
          VITE_DATADOG_CLIENT_TOKEN=${{ secrets.VITE_DATADOG_CLIENT_TOKEN }}
          VITE_DATADOG_SITE=${{ secrets.VITE_DATADOG_SITE || 'datadoghq.com' }}
          VITE_DATADOG_SERVICE=${{ secrets.VITE_DATADOG_SERVICE || 'sterling-hollis-fe' }}
          VITE_RELEASE=${{ steps.version.outputs.version }}
          FRONTEND_PORT=${{ secrets.FRONTEND_PORT || '3000' }}
          EOF

      - name: Deploy compose stack
        env:
          STOREFRONT_IMAGE: ${{ steps.deploy_image.outputs.ref }}
        run: |
          docker image inspect "${STOREFRONT_IMAGE}" >/dev/null 2>&1 || docker pull "${STOREFRONT_IMAGE}"
          docker compose -f deploy/docker-compose.prod.yml up -d --remove-orphans
          docker compose -f deploy/docker-compose.prod.yml ps

      - name: Health check
        run: |
          ATTEMPTS=24
          for attempt in $(seq 1 "$ATTEMPTS"); do
            echo "Health check attempt ${attempt}/${ATTEMPTS}"
            if curl -fsS "http://localhost:${FRONTEND_PORT}/frontend-health"; then
              echo "Application is healthy."
              exit 0
            fi
            docker compose -f deploy/docker-compose.prod.yml ps || true
            sleep 5
          done
          docker logs --tail 200 sterling-hollis-fe 2>/dev/null || true
          exit 1
