name: Sterling Hollis Frontend

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: self-hosted
    env:
      DOCKERHUB_IMAGE: ${{ secrets.DOCKERHUB_IMAGE }}
      FRONTEND_PORT: ${{ secrets.FRONTEND_PORT || '3001' }}
      COMPOSE_PROJECT_NAME: sterling-hollis-fe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Read version
        id: version
        run: |
          BASE_VERSION=$(tr -d '[:space:]' < VERSION)
          SHORT_SHA="${GITHUB_SHA::7}"
          VERSION="${BASE_VERSION}-${SHORT_SHA}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VERSION"

      - name: Verify docker access
        run: |
          docker version
          docker compose version

      - name: Detect image-affecting changes
        id: image_changes
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BEFORE_SHA="${{ github.event.before }}"
          AFTER_SHA="${GITHUB_SHA}"

          if [[ -z "$BEFORE_SHA" || "$BEFORE_SHA" =~ ^0+$ ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if ! git cat-file -e "${BEFORE_SHA}^{commit}" 2>/dev/null || ! git cat-file -e "${AFTER_SHA}^{commit}" 2>/dev/null; then
            git fetch --no-tags --prune --depth=100 origin "${GITHUB_REF#refs/heads/}" || true
          fi

          if ! CHANGED_FILES="$(git diff --name-only "$BEFORE_SHA" "$AFTER_SHA")"; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "$CHANGED_FILES"
          if echo "$CHANGED_FILES" | grep -Eq '^(src/|public/|docker/|deploy/|Dockerfile$|index\.html$|package(-lock)?\.json$|vite\.config\.js$|\.github/workflows/)'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          elif ! docker container inspect sterling-hollis-fe >/dev/null 2>&1; then
            echo "No existing storefront container found; forcing image build."
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push storefront image
        if: steps.image_changes.outputs.changed == 'true'
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login --username "${{ secrets.DOCKERHUB_USER }}" --password-stdin
          docker build \
            -t "${DOCKERHUB_IMAGE}:latest" \
            -t "${DOCKERHUB_IMAGE}:${{ steps.version.outputs.version }}" \
            .
          docker push "${DOCKERHUB_IMAGE}:latest"
          docker push "${DOCKERHUB_IMAGE}:${{ steps.version.outputs.version }}"

      - name: Resolve deploy image
        id: deploy_image
        shell: bash
        run: |
          if [[ "${{ steps.image_changes.outputs.changed }}" == "true" ]]; then
            DEPLOY_IMAGE="${DOCKERHUB_IMAGE}:${{ steps.version.outputs.version }}"
          else
            DEPLOY_IMAGE="$(docker container inspect sterling-hollis-fe --format '{{.Config.Image}}' 2>/dev/null || true)"
            if [[ -z "$DEPLOY_IMAGE" ]]; then
              DEPLOY_IMAGE="${DOCKERHUB_IMAGE}:latest"
            fi
          fi
          echo "Resolved deploy image: $DEPLOY_IMAGE"
          echo "ref=$DEPLOY_IMAGE" >> "$GITHUB_OUTPUT"

      - name: Write runtime env file
        run: |
          cat > deploy/runtime.env <<EOF
          VITE_API_URL=${{ secrets.VITE_API_URL }}
          VITE_API_PROXY_TARGET=${{ secrets.VITE_API_PROXY_TARGET || 'https://sterling-hollis-be.quickstark.com' }}
          VITE_DEFAULT_STORE_ID=${{ secrets.VITE_DEFAULT_STORE_ID }}
          VITE_ENVIRONMENT=${{ secrets.VITE_ENVIRONMENT || 'production' }}
          VITE_DATADOG_APPLICATION_ID=${{ secrets.VITE_DATADOG_APPLICATION_ID }}
          VITE_DATADOG_CLIENT_TOKEN=${{ secrets.VITE_DATADOG_CLIENT_TOKEN }}
          VITE_DATADOG_SITE=${{ secrets.VITE_DATADOG_SITE || 'datadoghq.com' }}
          VITE_DATADOG_SERVICE=${{ secrets.VITE_DATADOG_SERVICE || 'sterling-hollis-fe' }}
          VITE_RELEASE=${{ steps.version.outputs.version }}
          FRONTEND_PORT=${{ secrets.FRONTEND_PORT || '3001' }}
          EOF

      - name: Deploy compose stack
        env:
          STOREFRONT_IMAGE: ${{ steps.deploy_image.outputs.ref }}
        shell: bash
        run: |
          set -euo pipefail
          COMPOSE_ARGS=(-p "${COMPOSE_PROJECT_NAME}" -f deploy/docker-compose.prod.yml)

          docker image inspect "${STOREFRONT_IMAGE}" >/dev/null 2>&1 || docker pull "${STOREFRONT_IMAGE}"

          EXISTING_PROJECT="$(docker container inspect sterling-hollis-fe --format '{{ index .Config.Labels "com.docker.compose.project" }}' 2>/dev/null || true)"
          if [[ -n "$EXISTING_PROJECT" && "$EXISTING_PROJECT" != "${COMPOSE_PROJECT_NAME}" ]]; then
            echo "Removing stale sterling-hollis-fe container from Compose project: $EXISTING_PROJECT"
            docker rm -f sterling-hollis-fe
          fi

          PORT_OWNER="$(docker ps --filter "publish=${FRONTEND_PORT}" --format '{{.Names}} {{.Ports}}' | grep -v '^sterling-hollis-fe ' || true)"
          if [[ -n "$PORT_OWNER" ]]; then
            echo "FRONTEND_PORT=${FRONTEND_PORT} is already allocated by:"
            echo "$PORT_OWNER"
            echo "Set FRONTEND_PORT to a free host port or stop the conflicting service."
            exit 1
          fi

          docker compose "${COMPOSE_ARGS[@]}" up -d --remove-orphans
          docker compose "${COMPOSE_ARGS[@]}" ps

      - name: Health check
        shell: bash
        run: |
          set -euo pipefail
          COMPOSE_ARGS=(-p "${COMPOSE_PROJECT_NAME}" -f deploy/docker-compose.prod.yml)

          ATTEMPTS=24
          for attempt in $(seq 1 "$ATTEMPTS"); do
            echo "Health check attempt ${attempt}/${ATTEMPTS}"
            if curl -fsS "http://localhost:${FRONTEND_PORT}/frontend-health"; then
              echo "Application is healthy."
              exit 0
            fi
            docker compose "${COMPOSE_ARGS[@]}" ps || true
            sleep 5
          done
          docker logs --tail 200 sterling-hollis-fe 2>/dev/null || true
          exit 1
