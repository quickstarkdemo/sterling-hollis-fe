name: sterling-hollis-fe

services:
  storefront:
    image: ${STOREFRONT_IMAGE}
    container_name: sterling-hollis-fe
    restart: unless-stopped
    env_file:
      - ./runtime.env
    ports:
      - "${FRONTEND_PORT:-45173}:80"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1/frontend-health"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
